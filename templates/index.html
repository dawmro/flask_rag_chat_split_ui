<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Chat Split</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="main">

    <div class="panel">
      <div class="panel-header">
        <h3 style="margin:0;">📄 Document</h3>

        <label>
          <input type="checkbox" id="theme-toggle">
          Dark mode
        </label>
      </div>

      <div class="panel-body">
        <div id="pdf-empty">Upload a PDF to preview it here.</div>
        <iframe id="pdf-frame" hidden></iframe>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h3 style="margin:0;">Chat</h3>
      </div>

      <div id="chat-window">
        <div id="message-list"></div>
        <div id="loading" class="loading">Thinking...</div>
      </div>

      <div class="chat-input">
        <input id="message-input" placeholder="Ask about the PDF..." autocomplete="off">
        <button id="send-button" disabled>Send</button>
        <button id="reset-button">Reset</button>
      </div>
    </div>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
