<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Chat Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container-fluid vh-100">
    <div class="row">
      <section class="pdf-panel">
        <div class="chat-header">
          <h1>PDF Chat Assistant</h1>
        </div>
        <div id="pdf-panel">
          <div id="pdf-empty-state">Upload a PDF to preview it here.</div>
          <div id="pdf-viewer" hidden>
            <iframe id="pdf-frame" title="PDF viewer"></iframe>
          </div>
        </div>
      </section>

      <section class="col-md-6 d-flex flex-column h-100">
        <div id="chat-window">
          <div id="message-list"></div>
          <div class="loading-animation bot-loading">
            <div class="loading-dots">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        </div>

        <div class="chat-input-bar">
          <input
            id="message-input"
            type="text"
            placeholder="Ask a question about the PDF"
            autocomplete="off"
          />
          <div class="chat-actions">
            <button id="send-button" type="button">Send</button>
            <button id="reset-button" type="button">Reset</button>
            <label>
              <input id="light-dark-mode-switch" type="checkbox" />
              Dark
            </label>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
