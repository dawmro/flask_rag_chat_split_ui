<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Chat Split</title>

  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
  />
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
  />
</head>

<body>
  <div class="container-fluid vh-100">
    <div class="row h-100 no-gutters">

      <!-- PDF PANEL -->
      <div class="col-md-6 d-flex flex-column p-3 border-right pdf-panel">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-shrink-0">
          <h5 class="mb-0">📄 Document</h5>

          <div class="custom-control custom-switch">
            <input
              type="checkbox"
              class="custom-control-input"
              id="light-dark-mode-switch"
            />
            <label
              class="custom-control-label"
              for="light-dark-mode-switch"
            >
              Dark mode
            </label>
          </div>
        </div>

        <div id="pdf-panel">
          <div id="pdf-empty-state">Upload a PDF to preview it here.</div>

          <div id="pdf-viewer" hidden>
            <iframe
              id="pdf-frame"
              title="PDF Viewer"
            ></iframe>
          </div>
        </div>
      </div>

      <!-- CHAT PANEL -->
      <div class="col-md-6 d-flex flex-column h-100 p-3">
        <div class="chat-header border-bottom pb-2 mb-3 flex-shrink-0">
          <h5 class="mb-0">Chat</h5>
        </div>

        <div id="chat-window">
          <div id="message-list"></div>

          <div class="loading-animation bot-loading">
            <div class="loading-dots">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        </div>

        <div class="pt-3 flex-shrink-0">
          <div class="chat-input-bar">
            <input
              id="message-input"
              type="text"
              placeholder="Ask about the PDF..."
              autocomplete="off"
            />
            <div class="chat-actions">
              <button id="send-button" type="button">Send</button>
              <button id="reset-button" type="button">Reset</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
